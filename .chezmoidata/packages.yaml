packages:
  darwin:
    macports:
      - neovim
      - gnupg2
      - lazygit
      - sops
      - go # TODO: migrate to go-managed packages where possible instead of macports
      - zk
    homebrew:
      - hivemind
    shell_installs:
      rust:
        command: "curl https://sh.rustup.rs -sSf"
      tickrs:
        command: "cargo install tickrs"
      git-delta:
        command: "cargo install git-delta"
      golang:
        command: "go install github.com/charmbracelet/glow@latest"
  termux:
    - git
    - fzf
    - ripgrep
    - clang
    - neovim
    - rust
    - python
    - uv
    - lazygit
    - sops
    - golang
    - x11-repo
    - termux-x11-nightly
    - xfce
    - firefox
    # - alacritty
    # - kitty
    # - libxkbcommon
    # - libcanberra
    # - xdotool
    - wget
    - cmake
    - build-essential
    - syncthing
    - mutt
  linux:
    # Fedora atomic/Silverblue host packages for the Wayland compositor/session.
    # These integrate with the display manager, portals, input, and lock/session
    # stack, so they are managed at the host layer instead of Homebrew/Flatpak.
    rpm_ostree:
      - niri
      - xwayland-satellite
      - xdg-desktop-portal-gnome
      - xdg-desktop-portal-gtk
      - gnome-keyring
      - fuzzel
      - waybar
      - mako
      - swaybg
      - swaylock
      - swayidle
      - wl-clipboard
      - brightnessctl
      - playerctl
      - lxpolkit
    homebrew:
      # glibc must precede gcc: brew's gcc postinstall has two branches and
      # takes the self-contained one (using glibc.opt_lib for crt objects) only
      # when brew's glibc is installed. Otherwise it probes /usr/bin/cc, which
      # does not exist on Fedora Silverblue (no glibc-devel on the atomic host),
      # the postinstall fails, the unversioned gcc/cc symlinks are never
      # created, and DevelopmentTools.installed? returns false - blocking every
      # non-bottled formula install, including prebuilt-binary formulas.
      - name: glibc
        # keg-only: no `binary` skip-check, since its binaries (ld.so, ldd,
        # ldconfig) shadow system runtime tools and `command -v` would always
        # find the system copy. Always `brew install` (idempotent).
      # gcc provides the unversioned gcc/cc/g++/c++ symlinks that Homebrew's
      # DevelopmentTools gate checks for. Depends on glibc above.
      - name: gcc
        binary: gcc
      - name: fd
        binary: fd
      - name: fzf
        binary: fzf
      - name: gh
        binary: gh
      - name: git
        binary: git
      - name: git-delta
        binary: delta
      - name: glow
        binary: glow
      - name: gnupg
        binary: gpg
      - name: go
        binary: go
      - name: lazygit
        binary: lazygit
      - name: make
        binary: make
      - name: neovim
        binary: nvim
      - name: node
        binary: npm
      - name: pinentry
        binary: pinentry
      - name: ripgrep
        binary: rg
      - name: shfmt
        binary: shfmt
      - name: socat
        binary: socat
      - name: sops
        binary: sops
      - name: uv
        binary: uv
      - name: zk
        binary: zk
      # zmx comes from a third-party tap whose formula fetches a prebuilt
      # binary; it has no Linux bottle, so its install is gated behind
      # DevelopmentTools.installed? (satisfied by glibc+gcc above).
      - name: neurosnap/tap/zmx
        binary: zmx
      - name: zoxide
        binary: zoxide
    flatpak:
      # Prefer the Flatpak Firefox on Linux desktops for an additional app-level
      # sandbox around the browser package, while leaving the OS-provided
      # Firefox package alone on Fedora atomic systems.
      - org.mozilla.firefox
      - org.wezfurlong.wezterm
      # Speed of Sound is the current Linux speech-to-text choice. It uses XDG
      # Desktop Portals for GNOME Wayland text output, avoiding Handy's
      # wtype/ydotool compositor-specific workarounds. Network access is denied
      # by ~/.local/share/flatpak/overrides/io.speedofsound.SpeedOfSound.
      - io.speedofsound.SpeedOfSound
  npm_global:
    - package: "@earendil-works/pi-coding-agent"
      binary: "pi"
      args: "--ignore-scripts"
  uv_tool:
    - shot-scraper
    - ttok
    - files-to-prompt
    - strip-tags
    - dvc
    - visidata
    - python-dotenv
