packages:
  darwin:
    macports:
      - neovim
      - gnupg2
      - lazygit
      - sops
      - go # TODO: migrate to go-managed packages where possible instead of macports
      - zk
    homebrew:
      - hivemind
    shell_installs:
      rust:
        command: "curl https://sh.rustup.rs -sSf"
      tickrs:
        command: "cargo install tickrs"
      git-delta:
        command: "cargo install git-delta"
      golang:
        command: "go install github.com/charmbracelet/glow@latest"
  termux:
    - git
    - fzf
    - ripgrep
    - clang
    - neovim
    - rust
    - python
    - uv
    - lazygit
    - sops
    - golang
    - x11-repo
    - termux-x11-nightly
    - xfce
    - firefox
    # - alacritty
    # - kitty
    # - libxkbcommon
    # - libcanberra
    # - xdotool
    - wget
    - cmake
    - build-essential
    - syncthing
    - mutt
  linux:
    homebrew:
      - name: fd
        binary: fd
      - name: fzf
        binary: fzf
      - name: gh
        binary: gh
      - name: git
        binary: git
      - name: git-delta
        binary: delta
      - name: glow
        binary: glow
      - name: gnupg
        binary: gpg
      - name: go
        binary: go
      - name: lazygit
        binary: lazygit
      - name: neovim
        binary: nvim
      - name: node
        binary: npm
      - name: pinentry
        binary: pinentry
      - name: ripgrep
        binary: rg
      - name: shfmt
        binary: shfmt
      - name: sops
        binary: sops
      - name: uv
        binary: uv
      - name: zk
        binary: zk
      - name: zmx
        binary: zmx
      - name: zoxide
        binary: zoxide
    flatpak:
      - org.wezfurlong.wezterm
  npm_global:
    - package: "@earendil-works/pi-coding-agent"
      binary: "pi"
      args: "--ignore-scripts"
  uv_tool:
    - shot-scraper
    - ttok
    - files-to-prompt
    - strip-tags
    - dvc
    - visidata
    - python-dotenv
